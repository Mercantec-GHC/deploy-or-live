services:
 sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest 
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports: 
        - "127.0.0.1:1433:1433"
    volumes:
        - sqlserver_data:/var/opt/mssql
    healthcheck:
        test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
        interval: 10s
        timeout: 5s
        retries: 20
        start_period: 30s
    networks:
      - dodlj_network
 api:
    build:
      context: .
      dockerfile: API/Dockerfile
    environment:
     ASPNETCORE_ENVIRONMENT: Production
     ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=${DB_NAME};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
     DocumentationEditApiKey: "${DOCUMENTATION_EDIT_API_KEY}"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - dodlj_network
 blazor:
    build:
       context: .
       dockerfile: Blazor/Dockerfile
    depends_on:
      - api
    ports:
     - "8080:80"
    networks:
      - dodlj_network
    
volumes:
  sqlserver_data:
  
networks:
  dodlj_network:
